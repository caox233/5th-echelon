name: Apply SCBL Rust formatting

on:
  push:
    branches: [main]
    paths: ['.github/workflows/scbl-rustfmt-main.yml']

permissions:
  contents: write

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Apply pinned rustfmt
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install nightly-2025-10-15 --profile minimal --component rustfmt
          rustup override set nightly-2025-10-15
          cargo fmt --all
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m 'style: apply pinned rustfmt to SCBL sources'
            git push origin HEAD:main
          fi
