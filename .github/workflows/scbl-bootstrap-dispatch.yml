name: Dispatch SCBL integration

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/scbl-bootstrap-dispatch.yml'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  dispatch:
    runs-on: ubuntu-24.04
    steps:
      - name: Run integration workflow
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run scbl-integration-apply.yml --repo '${{ github.repository }}' --ref scbl-v0.6.2-integration
