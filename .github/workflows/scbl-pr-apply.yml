name: Apply SCBL integration from PR

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/scbl-integration-apply.yml'
      - 'hooks/**'
      - 'dedicated_server/**'

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'scbl-v0.6.2-integration'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: scbl-v0.6.2-integration
          fetch-depth: 0
      - name: Extract and execute integration script
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          lines = Path('.github/workflows/scbl-integration-apply.yml').read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(lines) if line == '        run: |') + 1
          body = []
          for line in lines[start:]:
              if line and not line.startswith('          '):
                  break
              body.append(line[10:] if line.startswith('          ') else '')
          Path('/tmp/scbl-apply.sh').write_text('\n'.join(body) + '\n', encoding='utf-8')
          PY
          bash /tmp/scbl-apply.sh
