name: Diagnose SCBL integration PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose:
    if: github.head_ref == 'scbl-v0.6.2-integration'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: scbl-v0.6.2-integration
          fetch-depth: 0
      - name: Run integration and persist log
        shell: bash
        run: |
          set +e
          python3 <<'PY'
          from pathlib import Path
          lines = Path('.github/workflows/scbl-integration-apply.yml').read_text(encoding='utf-8').splitlines()
          start = next(i for i, line in enumerate(lines) if line == '        run: |') + 1
          body = []
          for line in lines[start:]:
              if line and not line.startswith('          '):
                  break
              body.append(line[10:] if line.startswith('          ') else '')
          Path('/tmp/scbl-apply.sh').write_text('\n'.join(body) + '\n', encoding='utf-8')
          PY
          bash -x /tmp/scbl-apply.sh > SCBL_APPLY_LOG.txt 2>&1
          status=$?
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add SCBL_APPLY_LOG.txt
          git commit -m 'ci: record SCBL integration apply log [skip ci]' || true
          git push origin HEAD:scbl-v0.6.2-integration || true
          exit $status
