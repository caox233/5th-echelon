name: Apply SCBL v0.6.2 integration

on:
  push:
    branches: [scbl-v0.6.2-integration]
    paths:
      - '.github/workflows/scbl-integration-apply.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: scbl-v0.6.2-integration
          fetch-depth: 0
      - name: Apply Hooks and session fixes
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str):
              p = Path(path)
              text = p.read_text(encoding='utf-8')
              if new in text:
                  return
              if old not in text:
                  raise SystemExit(f'patch anchor not found in {path}: {old[:100]!r}')
              p.write_text(text.replace(old, new, 1), encoding='utf-8')

          # Hooks: support the compact 5th_auth.dat emitted by SplinterCellCNLauncher.
          cfg_path = Path('hooks/hooks-config/src/lib.rs')
          cfg = cfg_path.read_text(encoding='utf-8')
          cn_block = r'''
          #[derive(Debug, Deserialize)]
          struct CnAuthConfig {
              #[serde(rename = "Username")]
              username: String,
              #[serde(rename = "Password")]
              password: String,
              #[serde(rename = "AccountId")]
              account_id: Option<String>,
              #[serde(rename = "ConfigServer")]
              config_server: String,
              #[serde(rename = "ApiServer")]
              api_server: Url,
              #[serde(rename = "BindIP", alias = "BindIp")]
              bind_ip: Option<std::net::Ipv4Addr>,
              #[serde(rename = "EnableOverlay")]
              enable_overlay: Option<bool>,
              #[serde(rename = "AutoJoinInvite")]
              auto_join_invite: Option<bool>,
          }

          impl CnAuthConfig {
              fn into_config(self) -> Config {
                  let mut cfg = default();
                  cfg.user.username = self.username;
                  cfg.user.password = self.password;
                  cfg.user.account_id = self
                      .account_id
                      .filter(|s| !s.trim().is_empty())
                      .unwrap_or_else(|| cfg.user.username.clone());
                  cfg.config_server = if self.config_server.trim().is_empty() {
                      None
                  } else {
                      Some(self.config_server)
                  };
                  cfg.api_server = self.api_server;
                  if let Some(ip) = self.bind_ip {
                      cfg.networking.ip_address = Some(ip);
                  }
                  cfg.enable_overlay = self.enable_overlay.unwrap_or(true);
                  cfg.auto_join_invite = self.auto_join_invite.unwrap_or(false);
                  cfg.enable_hooks.insert(Hook::GetAdaptersInfo);
                  cfg.enable_hooks.insert(Hook::Gethostbyname);
                  cfg
              }
          }

          fn parse_cn_or_standard_config(content: &str) -> anyhow::Result<Config> {
              match toml::from_str::<CnAuthConfig>(content) {
                  Ok(cn_cfg) => {
                      info!("Loaded CN private auth config format");
                      Ok(cn_cfg.into_config())
                  }
                  Err(cn_err) => match toml::from_str::<Config>(content) {
                      Ok(cfg) => {
                          info!("Loaded standard hooks config format from 5th_auth.dat");
                          Ok(cfg)
                      }
                      Err(std_err) => Err(anyhow::anyhow!(
                          "Failed to parse 5th_auth.dat as CN format: {cn_err}; also failed as standard format: {std_err}"
                      )),
                  },
              }
          }
          '''.strip('\n') + '\n'
          if 'struct CnAuthConfig' not in cfg:
              cfg = cfg.replace('const DEFAULT_CONFIG: &str = r#"', cn_block + 'const DEFAULT_CONFIG: &str = r#"', 1)
          cfg = cfg.replace(
              'Err(ref err) if err.kind() == std::io::ErrorKind::NotFound && msgbox::show_msgbox_ok_cancel("Configuration not found, generate and exit?", "Configuration not found") => {\n            fs::write(path, DEFAULT_CONFIG)?;\n            msgbox::show_msgbox(&format!("Config file placed at {}", path.to_str().unwrap()), "Done");\n            std::process::exit(0);\n        }',
              'Err(ref err) if err.kind() == std::io::ErrorKind::NotFound => {\n            msgbox::show_msgbox(\n                "5th_auth.dat not found.\\n\\nPlease start the game with SplinterCellCNLauncher.",\n                "CN Launcher config missing",\n            );\n            std::process::exit(1);\n        }'
          )
          cfg = cfg.replace('let mut cfg: Config = toml::from_str(&content)?;', 'let mut cfg: Config = parse_cn_or_standard_config(&content)?;')
          cfg = cfg.replace('path.as_ref().join("uplay.toml")', 'path.as_ref().join("5th_auth.dat")')
          cfg_path.write_text(cfg, encoding='utf-8')

          # Hooks: force game sockets to the configured EasyTier virtual address.
          storm_path = Path('hooks/src/hooks/storm.rs')
          storm = storm_path.read_text(encoding='utf-8')
          storm = storm.replace('use std::ffi::c_char;', 'use std::collections::HashSet;\nuse std::ffi::c_char;', 1)
          storm = storm.replace('use std::ffi::CStr;\n', 'use std::ffi::CStr;\nuse std::net::Ipv4Addr;\nuse std::sync::{Mutex, OnceLock};\n', 1)
          storm = storm.replace('use tracing::instrument;\n', 'use tracing::instrument;\nuse tracing::warn;\n', 1)
          storm = storm.replace('use windows::Win32::Networking::WinSock::SOCKADDR;\n', 'use windows::Win32::Networking::WinSock::SOCKADDR;\nuse windows::Win32::Networking::WinSock::WSAGetLastError;\n', 1)
          storm = storm.replace('use crate::config::Config;\n', 'use crate::config;\nuse crate::config::Config;\n', 1)
          storm = storm.replace(
              '    static SomeEvent2Hook: unsafe extern "thiscall" fn(*mut c_void, *mut c_void, *mut c_void, *mut c_void, *mut c_void, *mut c_void) -> *mut c_void;\n',
              '    static SomeEvent2Hook: unsafe extern "thiscall" fn(*mut c_void, *mut c_void, *mut c_void, *mut c_void, *mut c_void, *mut c_void) -> *mut c_void;\n    static BindSocketHook: unsafe extern "stdcall" fn(usize, *const SOCKADDR, c_int) -> c_int;\n    static ConnectHook: unsafe extern "stdcall" fn(usize, *const SOCKADDR, c_int) -> c_int;\n    static WsaConnectHook: unsafe extern "stdcall" fn(usize, *const SOCKADDR, c_int, *mut c_void, *mut c_void, *mut c_void, *mut c_void) -> c_int;\n    static CloseSocketHook: unsafe extern "stdcall" fn(usize) -> c_int;\n',
              1,
          )
          helper = r'''
          #[repr(C)]
          #[derive(Clone, Copy)]
          struct SockAddrInRaw {
              sin_family: u16,
              sin_port: [u8; 2],
              sin_addr: [u8; 4],
              sin_zero: [u8; 8],
          }

          static BOUND_SOCKETS: OnceLock<Mutex<HashSet<usize>>> = OnceLock::new();

          fn bound_sockets() -> &'static Mutex<HashSet<usize>> {
              BOUND_SOCKETS.get_or_init(|| Mutex::new(HashSet::new()))
          }

          fn get_bind_ip() -> Option<Ipv4Addr> {
              config::get()?.networking.ip_address
          }

          fn sockaddr_ipv4(addr: *const SOCKADDR, len: c_int) -> Option<Ipv4Addr> {
              if addr.is_null() || len < 8 {
                  return None;
              }
              let addr = unsafe { addr.as_ref()? };
              if addr.sa_family != AF_INET {
                  return None;
              }
              Some(Ipv4Addr::new(
                  addr.sa_data[2] as u8,
                  addr.sa_data[3] as u8,
                  addr.sa_data[4] as u8,
                  addr.sa_data[5] as u8,
              ))
          }

          fn sockaddr_port(addr: *const SOCKADDR, len: c_int) -> Option<u16> {
              if addr.is_null() || len < 4 {
                  return None;
              }
              let addr = unsafe { addr.as_ref()? };
              if addr.sa_family != AF_INET {
                  return None;
              }
              Some(u16::from_be_bytes([addr.sa_data[0] as u8, addr.sa_data[1] as u8]))
          }

          fn sockaddr_port_bytes(addr: *const SOCKADDR, len: c_int) -> [u8; 2] {
              if addr.is_null() || len < 4 {
                  return [0, 0];
              }
              unsafe { addr.as_ref() }
                  .map(|addr| [addr.sa_data[0] as u8, addr.sa_data[1] as u8])
                  .unwrap_or([0, 0])
          }

          fn is_loopback(ip: Ipv4Addr) -> bool {
              ip.octets()[0] == 127
          }

          fn is_socket_marked_bound(socket: usize) -> bool {
              bound_sockets().lock().map_or(false, |sockets| sockets.contains(&socket))
          }

          fn mark_socket_bound(socket: usize) {
              if let Ok(mut sockets) = bound_sockets().lock() {
                  sockets.insert(socket);
              }
          }

          fn unmark_socket_bound(socket: usize) {
              if let Ok(mut sockets) = bound_sockets().lock() {
                  sockets.remove(&socket);
              }
          }

          fn make_bind_addr(bind_ip: Ipv4Addr, port: [u8; 2]) -> SockAddrInRaw {
              SockAddrInRaw {
                  sin_family: 2,
                  sin_port: port,
                  sin_addr: bind_ip.octets(),
                  sin_zero: [0; 8],
              }
          }

          fn should_rewrite_explicit_bind(original_ip: Ipv4Addr, bind_ip: Ipv4Addr) -> bool {
              original_ip != bind_ip && !is_loopback(original_ip)
          }

          fn force_bind_socket(socket: usize, reason: &str, target: *const SOCKADDR, target_len: c_int) {
              let Some(bind_ip) = get_bind_ip() else { return; };
              if is_socket_marked_bound(socket) { return; }
              let Some(target_ip) = sockaddr_ipv4(target, target_len) else { return; };
              let target_port = sockaddr_port(target, target_len).unwrap_or(0);
              let bind_addr = make_bind_addr(bind_ip, [0, 0]);
              let result = unsafe {
                  BindSocketHook.call(
                      socket,
                      (&bind_addr as *const SockAddrInRaw).cast::<SOCKADDR>(),
                      std::mem::size_of::<SockAddrInRaw>() as c_int,
                  )
              };
              mark_socket_bound(socket);
              if result == 0 {
                  info!("PublicVirtualNet socket bind [{reason}]: socket={socket}, {bind_ip}:0 -> {target_ip}:{target_port}");
              } else {
                  let err = unsafe { WSAGetLastError() };
                  warn!("PublicVirtualNet socket bind failed [{reason}]: socket={socket}, {bind_ip}:0 -> {target_ip}:{target_port}, wsa_error={err:?}.");
              }
          }

          #[instrument(skip_all)]
          fn bind_socket(socket: usize, name: *const SOCKADDR, namelen: c_int) -> c_int {
              let Some(bind_ip) = get_bind_ip() else {
                  let result = unsafe { BindSocketHook.call(socket, name, namelen) };
                  if result == 0 { mark_socket_bound(socket); }
                  return result;
              };
              let Some(original_ip) = sockaddr_ipv4(name, namelen) else {
                  let result = unsafe { BindSocketHook.call(socket, name, namelen) };
                  if result == 0 { mark_socket_bound(socket); }
                  return result;
              };
              if should_rewrite_explicit_bind(original_ip, bind_ip) {
                  let port = sockaddr_port_bytes(name, namelen);
                  let port_number = u16::from_be_bytes(port);
                  let bind_addr = make_bind_addr(bind_ip, port);
                  info!("PublicVirtualNet socket bind rewrite: socket={socket}, {original_ip}:{port_number} -> {bind_ip}:{port_number}");
                  let result = unsafe {
                      BindSocketHook.call(
                          socket,
                          (&bind_addr as *const SockAddrInRaw).cast::<SOCKADDR>(),
                          std::mem::size_of::<SockAddrInRaw>() as c_int,
                      )
                  };
                  if result == 0 { mark_socket_bound(socket); }
                  return result;
              }
              let result = unsafe { BindSocketHook.call(socket, name, namelen) };
              if result == 0 { mark_socket_bound(socket); }
              result
          }

          #[instrument(skip_all)]
          fn connect_socket(socket: usize, name: *const SOCKADDR, namelen: c_int) -> c_int {
              force_bind_socket(socket, "connect", name, namelen);
              unsafe { ConnectHook.call(socket, name, namelen) }
          }

          #[instrument(skip_all)]
          fn wsa_connect_socket(socket: usize, name: *const SOCKADDR, namelen: c_int, caller_data: *mut c_void, callee_data: *mut c_void, sqos: *mut c_void, gqos: *mut c_void) -> c_int {
              force_bind_socket(socket, "WSAConnect", name, namelen);
              unsafe { WsaConnectHook.call(socket, name, namelen, caller_data, callee_data, sqos, gqos) }
          }

          #[instrument(skip_all)]
          fn close_socket(socket: usize) -> c_int {
              unmark_socket_bound(socket);
              unsafe { CloseSocketHook.call(socket) }
          }
          '''.strip('\n') + '\n\n'
          if 'struct SockAddrInRaw' not in storm:
              storm = storm.replace("fn get_storm_event_name<'a>", helper + "fn get_storm_event_name<'a>", 1)
          storm = storm.replace('fn sendto(s: usize, buf: *const c_char, len: c_int, flag: c_int, to: *const SOCKADDR, tolen: c_int) -> c_int {\n', 'fn sendto(s: usize, buf: *const c_char, len: c_int, flag: c_int, to: *const SOCKADDR, tolen: c_int) -> c_int {\n    force_bind_socket(s, "sendto", to, tolen);\n\n', 1)
          old_init = '''    if let Ok(lib) = LoadLibraryA(s!("ws2_32.dll")) {
              if let Some(sendto_addr) = GetProcAddress(lib, s!("sendto")) {
                  super::configurable_hook!(config, Hook::StormPackets, SendToHook; Some(sendto_addr.as_ptr())  => sendto);
              }
              if let Some(recvfrom_addr) = GetProcAddress(lib, s!("recvfrom")) {
                  super::configurable_hook!(config, Hook::StormPackets, RecvFromHook; Some(recvfrom_addr.as_ptr())  => recvfrom);
              }
              let _ = FreeLibrary(lib);
          }'''
          new_init = '''    if let Ok(lib) = LoadLibraryA(s!("ws2_32.dll")) {
              if let Some(bind_addr) = GetProcAddress(lib, s!("bind")) {
                  super::hook!(BindSocketHook, Some(bind_addr.as_ptr()), bind_socket);
              }
              if let Some(connect_addr) = GetProcAddress(lib, s!("connect")) {
                  super::hook!(ConnectHook, Some(connect_addr.as_ptr()), connect_socket);
              }
              if let Some(wsa_connect_addr) = GetProcAddress(lib, s!("WSAConnect")) {
                  super::hook!(WsaConnectHook, Some(wsa_connect_addr.as_ptr()), wsa_connect_socket);
              }
              if let Some(close_socket_addr) = GetProcAddress(lib, s!("closesocket")) {
                  super::hook!(CloseSocketHook, Some(close_socket_addr.as_ptr()), close_socket);
              }
              if let Some(sendto_addr) = GetProcAddress(lib, s!("sendto")) {
                  super::hook!(SendToHook, Some(sendto_addr.as_ptr()), sendto);
              }
              if let Some(recvfrom_addr) = GetProcAddress(lib, s!("recvfrom")) {
                  super::hook!(RecvFromHook, Some(recvfrom_addr.as_ptr()), recvfrom);
              }
              let _ = FreeLibrary(lib);
          }'''
          storm = storm.replace(old_init, new_init, 1)
          storm = storm.replace(
              '    super::disable_configurable_hook!(config, Hook::StormPackets, SendToHook);\n    super::disable_configurable_hook!(config, Hook::StormPackets, RecvFromHook);',
              '    let _ = BindSocketHook.disable();\n    let _ = ConnectHook.disable();\n    let _ = WsaConnectHook.disable();\n    let _ = CloseSocketHook.disable();\n    let _ = SendToHook.disable();\n    let _ = RecvFromHook.disable();',
              1,
          )
          storm_path.write_text(storm, encoding='utf-8')

          # Storage invariants: creator is inserted transactionally and JoinSession is persisted.
          storage_path = Path('dedicated_server/src/storage/mod.rs')
          storage = storage_path.read_text(encoding='utf-8')
          old_create = '''    pub fn create_game_session(&self, user_id: u32, type_id: u32, attributes: String) -> Result<u32> {
              let id = run(sqlx::query("INSERT INTO game_sessions (type_id, creator_id, attributes) VALUES (?, ?, ?)")
                  .bind(type_id)
                  .bind(user_id)
                  .bind(attributes)
                  .execute(&self.pool))??
              .last_insert_rowid();

              #[allow(clippy::cast_possible_truncation)]
              #[allow(clippy::cast_sign_loss)]
              Ok(id as u32)
          }
          '''
          new_create = '''    pub fn create_game_session(&self, user_id: u32, type_id: u32, attributes: String) -> Result<u32> {
              let id = run(async {
                  let mut transaction = self.pool.begin().await?;
                  let id = sqlx::query("INSERT INTO game_sessions (type_id, creator_id, attributes) VALUES (?, ?, ?)")
                      .bind(type_id)
                      .bind(user_id)
                      .bind(attributes)
                      .execute(&mut *transaction)
                      .await?
                      .last_insert_rowid();
                  sqlx::query("INSERT OR IGNORE INTO participants (game_id, user_id) VALUES (?, ?)")
                      .bind(id)
                      .bind(user_id)
                      .execute(&mut *transaction)
                      .await?;
                  transaction.commit().await?;
                  Ok::<i64, sqlx::Error>(id)
              })??;

              #[allow(clippy::cast_possible_truncation)]
              #[allow(clippy::cast_sign_loss)]
              Ok(id as u32)
          }

              pub fn join_game_session(&self, user_id: u32, type_id: u32, session_id: u32) -> Result<bool> {
              let joined = run(async {
                  let result = sqlx::query(
                      r"INSERT OR IGNORE INTO participants (game_id, user_id)
                         SELECT id, ? FROM game_sessions
                         WHERE id = ? AND type_id = ? AND destroyed_at IS NULL",
                  )
                  .bind(user_id)
                  .bind(session_id)
                  .bind(type_id)
                  .execute(&self.pool)
                  .await?;
                  let (valid,): (i64,) = sqlx::query_as(
                      "SELECT EXISTS(SELECT 1 FROM participants p JOIN game_sessions g ON g.id=p.game_id WHERE p.game_id=? AND p.user_id=? AND g.type_id=? AND g.destroyed_at IS NULL)",
                  )
                  .bind(session_id)
                  .bind(user_id)
                  .bind(type_id)
                  .fetch_one(&self.pool)
                  .await?;
                  Ok::<bool, sqlx::Error>(result.rows_affected() <= 1 && valid == 1)
              })??;
              Ok(joined)
          }
          '''
          if 'pub fn join_game_session' not in storage:
              if old_create not in storage:
                  raise SystemExit('create_game_session anchor not found')
              storage = storage.replace(old_create, new_create, 1)
          storage_path.write_text(storage, encoding='utf-8')

          gs_path = Path('dedicated_server/src/game_session.rs')
          gs = gs_path.read_text(encoding='utf-8')
          imports = '''use crate::protocols::game_session_service::game_session_protocol::MigrateSessionHostRequest;
          use crate::protocols::game_session_service::game_session_protocol::MigrateSessionHostResponse;
          use crate::protocols::game_session_service::game_session_protocol::MigrateSessionRequest;
          use crate::protocols::game_session_service::game_session_protocol::MigrateSessionResponse;
          '''
          if 'MigrateSessionRequest' not in gs:
              gs = gs.replace('use crate::protocols::game_session_service::game_session_protocol::LeaveSessionResponse;\n', 'use crate::protocols::game_session_service::game_session_protocol::LeaveSessionResponse;\n' + imports, 1)
          old_join = '''    /// Handles the `JoinSession` request.
              ///
              /// This function currently returns an empty response.
              fn join_session(
                  &self,
                  _logger: &Logger,
                  _ctx: &Context,
                  _ci: &mut ClientInfo<CI>,
                  _request: JoinSessionRequest,
                  _client_registry: &ClientRegistry<CI>,
                  _socket: &std::net::UdpSocket,
              ) -> Result<JoinSessionResponse, Error> {
                  Ok(JoinSessionResponse)
              }
          '''
          new_join = '''    /// Handles the `JoinSession` request and persists the authenticated participant.
              fn join_session(
                  &self,
                  logger: &Logger,
                  _ctx: &Context,
                  ci: &mut ClientInfo<CI>,
                  request: JoinSessionRequest,
                  _client_registry: &ClientRegistry<CI>,
                  _socket: &std::net::UdpSocket,
              ) -> Result<JoinSessionResponse, Error> {
                  let user_id = login_required(&*ci)?;
                  info!(logger, "Client joins session: {:?}", request);
                  let joined = rmc_err!(
                      self.storage.join_game_session(
                          user_id,
                          request.game_session_key.type_id,
                          request.game_session_key.session_id,
                      ),
                      logger,
                      "error joining game session"
                  )?;
                  if !joined {
                      warn!(logger, "Rejected game session join"; "session_id" => request.game_session_key.session_id, "type_id" => request.game_session_key.type_id, "user_id" => user_id);
                      return Err(Error::AccessDenied);
                  }
                  Ok(JoinSessionResponse)
              }
          '''
          if 'Client joins session:' not in gs:
              if old_join not in gs:
                  raise SystemExit('join_session anchor not found')
              gs = gs.replace(old_join, new_join, 1)
          migrate_methods = '''
              fn migrate_session(
                  &self,
                  logger: &Logger,
                  _ctx: &Context,
                  ci: &mut ClientInfo<CI>,
                  request: MigrateSessionRequest,
                  _client_registry: &ClientRegistry<CI>,
                  _socket: &std::net::UdpSocket,
              ) -> Result<MigrateSessionResponse, Error> {
                  let user_id = login_required(&*ci)?;
                  let migrated = rmc_err!(self.storage.migrate_game_session_host(user_id, request.game_session_key.type_id, request.game_session_key.session_id), logger, "error migrating game session")?;
                  if !migrated { return Err(Error::AccessDenied); }
                  Ok(MigrateSessionResponse { game_session_key_migrated: request.game_session_key })
              }

              fn migrate_session_host(
                  &self,
                  logger: &Logger,
                  _ctx: &Context,
                  ci: &mut ClientInfo<CI>,
                  request: MigrateSessionHostRequest,
                  _client_registry: &ClientRegistry<CI>,
                  _socket: &std::net::UdpSocket,
              ) -> Result<MigrateSessionHostResponse, Error> {
                  let user_id = login_required(&*ci)?;
                  let migrated = rmc_err!(self.storage.migrate_game_session_host(user_id, request.game_session_key.type_id, request.game_session_key.session_id), logger, "error migrating game session host")?;
                  if !migrated { return Err(Error::AccessDenied); }
                  Ok(MigrateSessionHostResponse)
              }
          '''
          if 'fn migrate_session(' not in gs:
              gs = gs.replace('    /// Handles the `LeaveSession` request.\n', migrate_methods + '\n    /// Handles the `LeaveSession` request.\n', 1)
          gs_path.write_text(gs, encoding='utf-8')
          PY

          cargo fmt --all
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add hooks dedicated_server/src/game_session.rs dedicated_server/src/storage/mod.rs
          if ! git diff --cached --quiet; then
            git commit -m 'SCBL: integrate CN hooks and persist game-session membership'
            git push origin HEAD:scbl-v0.6.2-integration
          fi
