name: Build SCBL 5th binaries

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/scbl-public-stable-build.yml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'rust-toolchain.toml'
      - 'api/**'
      - 'dedicated_server/**'
      - 'hooks/**'
      - 'quazal/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scbl-5th-binaries
  cancel-in-progress: true

env:
  RUST_TOOLCHAIN: nightly-2025-10-15
  RELEASE_TAG: scbl-public-stable-latest

jobs:
  dedicated-linux:
    name: Dedicated server Linux x86_64
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install build dependencies
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config protobuf-compiler libssl-dev libsqlite3-dev libsodium-dev
      - name: Install pinned Rust
        shell: bash
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --component rustfmt
          rustup override set "$RUST_TOOLCHAIN"
          rustc --version
          cargo --version
          protoc --version
      - name: Check formatting and tests
        shell: bash
        run: |
          cargo fmt --all -- --check
          cargo test --locked -p dedicated_server
      - name: Build dedicated server
        shell: bash
        run: |
          cargo build --locked --release -p dedicated_server
          mkdir -p dist
          install -m 0755 target/release/dedicated_server dist/dedicated_server-linux-x86_64
          file dist/dedicated_server-linux-x86_64
          sha256sum dist/dedicated_server-linux-x86_64 > dist/dedicated_server-linux-x86_64.sha256
          printf '%s\n' "$GITHUB_SHA" > dist/commit_sha.txt
      - uses: actions/upload-artifact@v4
        with:
          name: scbl-dedicated-linux
          path: dist/*
          if-no-files-found: error
          retention-days: 30

  hooks-windows:
    name: Hooks Windows x86
    runs-on: windows-2022
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install protoc
        shell: powershell
        run: choco install protoc -y --no-progress
      - name: Install pinned Rust and target
        shell: powershell
        run: |
          rustup toolchain install $env:RUST_TOOLCHAIN --profile minimal --component rustfmt
          rustup target add i686-pc-windows-msvc --toolchain $env:RUST_TOOLCHAIN
          rustup override set $env:RUST_TOOLCHAIN
          rustc --version
          cargo --version
          protoc --version
      - name: Check formatting and build Hooks
        shell: powershell
        run: |
          cargo fmt --all -- --check
          cargo build --locked --release -p hooks --target i686-pc-windows-msvc
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $dll = 'target\i686-pc-windows-msvc\release\hooks.dll'
          if (!(Test-Path -LiteralPath $dll)) { throw "Hooks DLL was not generated: $dll" }
          Copy-Item -Force $dll 'dist\uplay_r1_loader.dll'
          $loader = 'target\i686-pc-windows-msvc\release\hook-loader.exe'
          if (Test-Path -LiteralPath $loader) { Copy-Item -Force $loader 'dist\hook-loader.exe' }
          $hash = (Get-FileHash 'dist\uplay_r1_loader.dll' -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  uplay_r1_loader.dll" | Set-Content -Encoding ascii 'dist\uplay_r1_loader.dll.sha256'
          Get-ChildItem dist | Format-Table Name, Length
      - uses: actions/upload-artifact@v4
        with:
          name: scbl-hooks-windows-x86
          path: dist/*
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish rolling binaries
    needs: [dedicated-linux, hooks-windows]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: scbl-*
          path: dist
          merge-multiple: true
      - name: Validate assets
        shell: bash
        run: |
          set -euo pipefail
          test -s dist/dedicated_server-linux-x86_64
          test -s dist/dedicated_server-linux-x86_64.sha256
          test -s dist/uplay_r1_loader.dll
          test -s dist/uplay_r1_loader.dll.sha256
          sha256sum -c dist/dedicated_server-linux-x86_64.sha256
          (cd dist && sha256sum -c uplay_r1_loader.dll.sha256)
          ls -lah dist
      - name: Publish rolling SCBL 5th release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag -f "$RELEASE_TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$RELEASE_TAG" --force
          notes_file="$(mktemp)"
          cat > "$notes_file" <<EOF
          SCBL 专用 5th 滚动构建。

          来源分支：main
          提交：$GITHUB_SHA
          Rust：$RUST_TOOLCHAIN

          本 Release 同时提供 Linux dedicated_server 与 Windows x86 Hooks DLL。
          EOF
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title 'SCBL 5th stable binaries' --notes-file "$notes_file" --prerelease
          else
            gh release create "$RELEASE_TAG" --title 'SCBL 5th stable binaries' --notes-file "$notes_file" --prerelease
          fi
          gh release upload "$RELEASE_TAG" dist/* --clobber
