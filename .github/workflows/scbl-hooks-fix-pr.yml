name: Fix SCBL Hooks duplicate detours

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    if: github.head_ref == 'scbl-v0.6.2-integration'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: scbl-v0.6.2-integration
          fetch-depth: 0
      - name: Remove duplicate detour declarations
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          p=Path('hooks/src/hooks/storm.rs')
          text=p.read_text(encoding='utf-8')
          block='''    static BindSocketHook: unsafe extern "stdcall" fn(usize, *const SOCKADDR, c_int) -> c_int;
              static ConnectHook: unsafe extern "stdcall" fn(usize, *const SOCKADDR, c_int) -> c_int;
              static WsaConnectHook: unsafe extern "stdcall" fn(usize, *const SOCKADDR, c_int, *mut c_void, *mut c_void, *mut c_void, *mut c_void) -> c_int;
              static CloseSocketHook: unsafe extern "stdcall" fn(usize) -> c_int;
          '''
          first=text.find(block)
          second=text.find(block, first+1) if first >= 0 else -1
          if second >= 0:
              text=text[:second]+text[second+len(block):]
          elif text.count('static BindSocketHook:') > 1:
              lines=text.splitlines(True)
              seen=set(); out=[]
              names=('BindSocketHook','ConnectHook','WsaConnectHook','CloseSocketHook')
              for line in lines:
                  matched=next((n for n in names if f'static {n}:' in line),None)
                  if matched and matched in seen: continue
                  if matched: seen.add(matched)
                  out.append(line)
              text=''.join(out)
          p.write_text(text,encoding='utf-8')
          PY
          cargo fmt --all
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add hooks/src/hooks/storm.rs
          git commit -m 'hooks: remove duplicate Winsock detour declarations'
          git push origin HEAD:scbl-v0.6.2-integration
